"$schema" = 'https://starship.rs/config-schema.json'

# Διπλή γραμμή: Πάνω οι πληροφορίες, κάτω η εντολή
format = """
[╭─](subtext0) $os$directory$git_branch$git_status$c$rust$golang$nodejs$php$java$kotlin$haskell$python$docker_context$time$cmd_duration
[╰─](subtext0) $character"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
orange = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
disabled = false
style = "fg:mauve bold"
format = "[$symbol]($style) "

[os.symbols]
Arch = "󰣇"
Linux = "󰌽"
Ubuntu = "󰕈"
Macos = ""

[directory]
style = "fg:blue bold"
format = "[ $path ]($style)"
truncation_length = 1
truncation_symbol = ""

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "fg:pink"
format = '[[ $symbol $branch ](fg:pink)]($style)'

[git_status]
style = "fg:red"
format = '[[($all_status$ahead_behind )](fg:red)]($style)'

[nodejs]
symbol = ""
style = "fg:green"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[c]
symbol = " "
style = "fg:sapphire"
format = '[[ $symbol( $version) ](fg:sapphire)]($style)'

[rust]
symbol = ""
style = "fg:peach"
format = '[[ $symbol( $version) ](fg:peach)]($style)'

[golang]
symbol = ""
style = "fg:teal"
format = '[[ $symbol( $version) ](fg:teal)]($style)'

[java]
symbol = " "
style = "fg:red"
format = '[[ $symbol( $version) ](fg:red)]($style)'

[python]
symbol = ""
style = "fg:yellow"
format = '[[ $symbol( $version) ](fg:yellow)]($style)'

[docker_context]
symbol = ""
style = "fg:blue"
format = '[[ $symbol( $context) ](fg:blue)]($style)'

[time]
disabled = true
time_format = "%R"
style = "fg:subtext0"
format = '[[  $time ](fg:subtext0)]($style)'

[cmd_duration]
min_time = 2_000
format = "[[ 󰔛 $duration ](fg:yellow)]($style)"

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:green)'
error_symbol = '[](bold fg:red)'
vimcmd_symbol = '[](bold fg:green)'
