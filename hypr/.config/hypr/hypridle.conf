general {
    lock_cmd = pidof hyprlock || hyprlock       # Τρέξε το hyprlock αν δεν τρέχει ήδη
    before_sleep_cmd = loginctl lock-session    # Κλείδωμα πριν το suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # Άνοιγμα οθόνης μετά το wake up
}

# 1. Χαμήλωσε τον φωτισμό (Dim) στα 5 λεπτά
listener {
    timeout = 300                                
    on-timeout = brightnessctl set 10% -s       # Χαμήλωσε στο 10% (κράτα το παλιό status)
    on-resume = brightnessctl -r                # Επαναφορά φωτεινότητας
}

# 2. Κλείδωμα στα 10 λεπτά (Αυτό που είχες)
listener {
    timeout = 600                            
    on-timeout = loginctl lock-session           
}

# 3. Κλείσιμο οθόνης (DPMS) στα 11 λεπτά
listener {
    timeout = 660                                
    on-timeout = hyprctl dispatch dpms off       # Κλείσε το σήμα της οθόνης
    on-resume = hyprctl dispatch dpms on         # Άνοιξε την οθόνη μόλις κουνήσεις το ποντίκι
}

